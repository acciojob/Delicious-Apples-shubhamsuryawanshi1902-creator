<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title></title>
	<meta name="description" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="/styles.css">
</head>
	<style>
.body{
    margin:0;
    background:#4CAF50;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
}

.product{
    display:flex;
    align-items:center;
    background:white;
    padding:40px;
    border-radius:10px;
    gap:40px;
}

.photo-main{
    width:370px;
    background:#9acd32;
    padding:20px;
    border-radius:10px;
}

.controls{
    display:flex;
    justify-content:space-between;
    color:white;
    font-size:20px;
    margin-bottom:10px;
}

.photo-main img{
    width:100%;
    display:block;
}

.photo-album{
    display:flex;
    justify-content:center;
    gap:10px;
    background:white;
    padding:10px;
    margin-top:10px;
}

.photo-album img{
    width:60px;
    border:1px solid #ccc;
    padding:5px;
}
		.photo-album ul{
    display:flex;
    list-style:none;
    padding:0;
    margin:0;
    gap:10px;
}

.photo-album li img{
    width:60px;
}

.product__info{
    width:450px;
}

.title h1{
    margin-bottom:5px;
}

.title span{
    color:gray;
}

.price{
    color:#ff5a5a;
    font-size:50px;
    margin:20px 0;
}

.variant{

    gap:10px;
    margin:15px 0;
}

.variant img{
    width:40px;
    border:1px solid #ccc;
    padding:3px;
	height:60px
}
		.variant ul{
    display:flex;
    list-style:none;
    padding:0;
    margin:0;
    gap:10px;
}

.variant li img{
    width:40px;
}

h3,h2{
    color:#666;
}

ul{
    line-height:1.8;
}

button{
    background:#ff5a5a;
    color:white;
    border:none;
    padding:15px 50px;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
}
</style>
	

<body>
	<section class="product">
		<div class="product__photo">
			<div class="photo-container">
				<div class="photo-main">
					<div class="controls">
						<i class="fa fa-share-alt"></i>
						<i class="fa fa-heart-o" ></i>
					</div>
					

					
					
					<img src="https://res.cloudinary.com/john-mantas/image/upload/v1537291846/codepen/delicious-apples/green-apple-with-slice.png"
						alt="green apple slice">
				
					<div class="photo-album">
						<ul>
							<li><img src="https://res.cloudinary.com/john-mantas/image/upload/v1537302064/codepen/delicious-apples/green-apple2.png"
								alt="green apple"></li>
				<li><img src="https://res.cloudinary.com/john-mantas/image/upload/v1537303532/codepen/delicious-apples/half-apple.png"
								alt="half apple"></li>
						<li><img src="https://res.cloudinary.com/john-mantas/image/upload/v1537303160/codepen/delicious-apples/green-apple-flipped.png"
								alt="green apple"></li>
						<li><img src="https://res.cloudinary.com/john-mantas/image/upload/v1537303708/codepen/delicious-apples/apple-top.png"
								alt="apple top"></li>
						</ul>
					</div>
				</div>
				
				</div>
				
			</div>
		</div>
		<div class="product__info">
			<div class="title">
				<h1>Delicious Apples</h1>
				<span>CODE: 45999</span>
			</div>
			<div class="price">
				R$ <span>7.93</span>
			</div>
			<div class="variant">
				<h3>SELECT A COLOR</h3>
				<ul>
					<li><img src="https://res.cloudinary.com/john-mantas/image/upload/v1537302064/codepen/delicious-apples/green-apple2.png"
							alt="green apple"></li>
					<li><img src="https://res.cloudinary.com/john-mantas/image/upload/v1537302752/codepen/delicious-apples/yellow-apple.png"
							alt="yellow apple"></li>
					<li><img src="https://res.cloudinary.com/john-mantas/image/upload/v1537302427/codepen/delicious-apples/orange-apple.png"
							alt="orange apple"></li>
					<li><img src="https://res.cloudinary.com/john-mantas/image/upload/v1537302285/codepen/delicious-apples/red-apple.png"
							alt="red apple"></li>
				</ul>
				<h2>BENEFITS</h2>
				<ul>
					<li>apple are nutricious</li>
					<li>apple may be good for weight loss </li>
					<li> apple may be good for bone health </li>
					<li>they're linked to a lowest risk for diabeates</li>
				</ul>
				<button>ADD TO CART</button>
			</div>
			<div class="description">
				
				
			</div>
		</div>
	</section>
</body>

</html>
